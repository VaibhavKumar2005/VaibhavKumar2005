name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          # CHANGE THIS LINE to use your new PAT secret
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: VaibhavKumar2005
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large
          
          # Stable Plugins for your Cloud/AI Portfolio
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_habits: yes
          plugin_habits_from: 200
          
          # Use GITHUB_TOKEN for pushing the file back to repo
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "Update GitHub metrics [skip ci]"
